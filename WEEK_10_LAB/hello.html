<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Vue</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

<div id="app">
    <h1>Hello Vue</h1>

    <!-- shows the computed message -->
    <p>{{ messageWithExclamationPoints }}</p>
    
    <!-- runs this function when clicked -->
    <button v-on:click="addExclamationPoints">Add Exclamation Points</button>

    <!-- resets the message -->
    <button v-on:click="clearExclamationPoints">Clear Exclamation Points</button>
</div>

<script>
    // createApp starts vue, ref makes data reactive, computed builds a value from other data
    const { createApp, ref, computed } = Vue

    createApp({
        setup() {
            const message = ref('Hi')
            const numberOfExclamationPoints = ref(1)

            function addExclamationPoints() {
                // only lets the user go up to 10
                if (numberOfExclamationPoints.value < 10) {
                    numberOfExclamationPoints.value++
                } else {
                    alert('No more exclamation points!')
                }
            }
            
            function clearExclamationPoints() {
                // resets both values.
                numberOfExclamationPoints.value = 0
                message.value = "Hi"
            }

            // computed updates automaticly when reactive data changes
            const messageWithExclamationPoints = computed(function() {
                let computedMessage = message.value

                // adds ! one at a time based on the current number
                for (let x = 0; x < numberOfExclamationPoints.value; x++) {
                    computedMessage = computedMessage + '!'
                }

                return computedMessage
            })

            // returned values can be used in the html
            return {
                message,
                numberOfExclamationPoints,
                messageWithExclamationPoints,
                addExclamationPoints,
                clearExclamationPoints
            }
        }
    }).mount('#app') // attaches vue to the div with id app
</script>
    
</body>
</html>
