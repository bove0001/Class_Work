<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Vue Forms
    </title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>

 <div id="app">
    <h1>Enter your name:</h1>

    <!-- v-model connects the input to the name variable -->
    <input v-model="name" type="text">

    <!-- v-if shows this only when name has a value -->
    <p v-if="name">Hello, {{ name }}!</p>

    <!-- v-else shows when name is empty  -->
    <p v-else>Please enter your name.</p>

    <!-- clears the text box when clicked -->
    <button @click="name = ''">Clear</button>
 </div>

 <script>
    // createApp starts vue, ref makes reactive data
    const { createApp, ref } = Vue

    createApp({
        setup() {
            // starts as an empty string.
            const name = ref('')

            function clearName() {
                // sets name back to blank
                name.value = ''
            }

            // returned values can be used in the html
            return {
                name,
                clearName
            }
        }
    }).mount('#app') // attaches vue to the div with id app
</script>

</body>
</html>
